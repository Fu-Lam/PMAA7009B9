                    <i class="fas fa-magic"></i> 生成 AI 合规诊断报告

        <!-- Loading State -->

    <script>
        // --- 豆包 (Doubao) API 配置 ---
        const CONFIG = {
            API_KEY: 'ark-6c00de05-4616-42eb-b202-358f5bb04057-49af4', 
            MODEL_ID: 'doubao-seed-2-0-mini-260215',
            BASE_URL: 'https://ark.cn-beijing.volces.com/api/v3/chat/completions',
            IS_MOCK: false // 切换为真实 API
        };

        function toggleProductQuestions() {
            const type = document.getElementById('productType').value;
            document.querySelectorAll('.question-block').forEach(block => block.style.display = 'none');
            if (type) {
                const target = document.getElementById(`${type}-questions`);
                if (target) target.style.display = 'block';
            }
        }

        async function submitDiagnosis() {
            const productType = document.getElementById('productType').value;
            if (!productType) {
                alert('请先选择产品类型');
                return;
            }

            const formData = collectFormData();
            document.getElementById('diagnosisFormContainer').style.display = 'none';
            document.getElementById('loader').style.display = 'block';

            try {
                let reportContent = "";
                if (CONFIG.API_KEY === 'YOUR_API_KEY_HERE' || CONFIG.IS_MOCK) {
                    reportContent = await simulateAIReport(productType, formData);
                } else {
                    reportContent = await callRealAI(productType, formData);
                }
                renderReport(reportContent);
            } catch (error) {
                console.error(error);
                alert('抱歉，生成报告时遇到错误，请稍后重试');
                location.reload();
            } finally {
                document.getElementById('loader').style.display = 'none';
            }
        }

        function collectFormData() {
            const form = document.getElementById('dynamicDiagnosisForm');
            const data = {};
            const inputs = form.querySelectorAll('input[type="radio"]:checked');
            inputs.forEach(input => {
                const label = input.closest('.form-group').querySelector('label').innerText;
                data[label] = input.value === 'yes' ? '是' : '否';
            });
            return data;
        }

        async function simulateAIReport(type, data) {
            await new Promise(resolve => setTimeout(resolve, 2500));
            const typeName = document.getElementById('productType').selectedOptions[0].text;
            
            // 逻辑化评分系统：区分正面和负面问题
            let score = 50; // 基础分

            // 正面加分项 (用户回答“是”代表合规性更好)
            const positiveLabels = [
                'P2. 客户备付金是否 100% 全额交存中国人民银行？',
                'P3. 交易记录是否自完成之日起保存至少 5 年？',
                'P4. 是否建立了完整的客户身份识别（KYC）体系？',
                'C1. 贷款利率是否控制在 LPR 的 4 倍以内？',
                'C4. 是否充分披露了所有利息、费用和还款条款？',
                'W1. 是否取得了相应的资产管理业务牌照？',
                'W2. 是否向投资者充分揭示了投资风险？',
                'W4. 投资者资金是否由第三方商业银行进行托管？',
                'I1. 是否与持牌保险公司开展合作？',
                'I2. 是否如实告知保险产品的个人信息处理规则？',
                'I4. 理赔流程是否公开透明、符合监管要求？'
            ];

            // 负面减分项 (用户回答“是”代表存在违规风险)
            const negativeLabels = [
                'P1. 是否从事跨境外币支付业务？', // 跨境涉及更高风险
                'C2. 是否向无收入来源的借款人（如在校学生）发放贷款？',
                'C3. 是否采用暴力、胁迫、骚扰等非法方式催收贷款？',
                'W3. 是否向投资者作出任何刚性兑付（保本保收益）承诺？',
                'I3. 是否存在夸大保险责任、误导性销售的行为？',
                'G1. 是否收集用户个人敏感信息（身份证、生物识别等）？',
                'G2. 是否集成了第三方 SDK（统计、广告、社交等）？',
                'G3. 是否向用户推送营销信息（短信、弹窗等）？',
                'G4. 用户数据是否会传输到中国境外？'
            ];

            for (const [label, value] of Object.entries(data)) {
                if (positiveLabels.some(pl => label.includes(pl.substring(0, 10)))) {
                    score += (value === '是' ? 12 : -10);
                } else if (negativeLabels.some(nl => label.includes(nl.substring(0, 10)))) {
                    score += (value === '是' ? -15 : 5);
                }
            }

            score = Math.max(0, Math.min(100, score));
            let risk = "低";
            if (score < 60) risk = "高";
            else if (score < 85) risk = "中";

            const resultText = score >= 85 ? "合规表现优秀" : (score >= 60 ? "合规基本合格" : "合规风险极高");
            const issueText = score >= 85 ? "目前业务逻辑基本符合监管导向，建议保持关注。" : "检测到多项核心业务逻辑与监管红线冲突，建议立即自查。";

            return `
# 合规评分：${score} | 风险等级：${risk}

## 1. 整体合规概况
针对 **${typeName}** 业务的初步诊断显示，您的产品${resultText}。合规评分达 ${score} 分。

## 2. 存在的合规问题
- **${risk === '低' ? '优化点' : '关键风险'}**：${issueText}
- **法规参考**：涉及《个人信息保护法》及${typeName === '支付产品' ? '《非银行支付机构监督管理条例》' : '相关金融监管指引'}。

## 3. 整改建议
1. **${risk === '低' ? '持续监测' : '立即整改'}**：针对本次扫描中回答为“否”的合规项（如资质/记录保存等）进行补强。
2. **制度建设**：建立常态化合规审查机制。

## 4. 总结
作为金融科技初创企业，${score > 80 ? '您的合规意识较好，请继续保持。' : '建议在业务扩张前先行解决合规短板。'}
`;
        }

        async function callRealAI(type, data) {
            const typeName = document.getElementById('productType').selectedOptions[0].text;
            const systemPrompt = `你是一位专业的中国金融科技合规审计师，请根据用户提交的产品信息，生成一份详细、专业的合规诊断报告。
要求：
1. 首先给出整体合规评分（0-100 分）和对应的风险等级（低 / 中 / 高）
2. 分点列出存在的合规问题，每个问题必须明确指出违反的具体中国监管法规
3. 针对每个问题给出具体、可操作的整改建议，不要泛泛而谈
4. 最后给出总结和下一步行动建议
5. 语言专业严谨，适合金融科技初创公司创始人阅读
6. 报告格式清晰，使用标题和有序列表，适合在网页上展示`;

            const userPrompt = `产品类型：${typeName}\n详细调研回答数据：\n${JSON.stringify(data, null, 2)}`;

            try {
                const response = await fetch(CONFIG.BASE_URL, {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${CONFIG.API_KEY}`
                    },
                    body: JSON.stringify({
                        model: CONFIG.MODEL_ID,
                        messages: [
                            { role: "system", content: systemPrompt },
                            { role: "user", content: userPrompt }
                        ]
                    })
                });

                if (!response.ok) {
                    const err = await response.json();
                    throw new Error(err.error?.message || 'API 调用失败');
                }

                const result = await response.json();
                return result.choices[0].message.content;
            } catch (error) {
                console.error('API Error:', error);
                throw error;
            }
        }

        function renderReport(content) {
            const reportArea = document.getElementById('reportResult');
            const details = document.getElementById('reportDetails');
            const scoreSection = document.getElementById('scoreSection');
            const riskBadge = document.getElementById('riskBadge');

            reportArea.style.display = 'block';
            
            const scoreMatch = content.match(/评分[：\s](\d+)/);
            const riskMatch = content.match(/风险等级[：\s](低|中|高)/);
            const score = scoreMatch ? scoreMatch[1] : "??";
            const risk = riskMatch ? riskMatch[1] : "未知";

            let riskClass = 'risk-low';
            if (risk === '中') riskClass = 'risk-medium';
            if (risk === '高') riskClass = 'risk-high';

            riskBadge.innerHTML = `<span class="risk-level ${riskClass}">${risk}风险</span>`;
            scoreSection.innerHTML = `
                <div class="score-circle">
                    <span class="num">${score}</span>
                    <span style="font-size: 0.8rem;">合规总分</span>
                </div>
                <p style="color: #666; font-size: 0.95rem; line-height: 1.5;">
                    基于 AI 审计引擎对 <strong>${document.getElementById('productType').selectedOptions[0].text}</strong> 的合规诊断。
                </p>
            `;

            let formattedBody = content
                .replace(/^# (.*$)/gim, '<h2 style="color:var(--dark-blue); margin-top:20px;">$1</h2>')
                .replace(/^## (.*$)/gim, '<h3 style="color:var(--primary-blue); margin-top:15px; border-bottom:1px solid #eee; padding-bottom:5px;">$1</h3>')
                .replace(/^\- (.*$)/gim, '<div class="compliance-issue">$1</div>')
                .replace(/^\d\. (.*$)/gim, '<div class="compliance-advice">$1</div>')
                .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');

            details.innerHTML = formattedBody;
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
    </script>
</body>
</html>
