<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>法律文书生成 - FinCheck</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <div class="container nav-container">
            <a href="index.html" class="logo">FinCheck</a>
            <ul class="nav-links">
                <li><a href="index.html">首页</a></li>
                <li><a href="quick-check.html">合规速查</a></li>
                <li><a href="diagnosis.html">合规诊断</a></li>
                <li><a href="document-generation.html" class="active">文书生成</a></li>
                <li><a href="pricing.html">定价</a></li>
                <li><a href="about.html">关于我们</a></li>
            </ul>
        </div>
    </nav>

    <header class="page-header">
        <div class="container">
            <h1>AI 法律文书生成</h1>
            <p>基于 AI 专家逻辑，一键生成符合金融监管要求的合规文书草案。</p>
        </div>
    </header>

    <main class="container">
        <!-- Form Section -->
        <div class="diagnosis-container" id="genContainer">
            <h2 style="margin-bottom: 30px; text-align: center; color: var(--dark-blue);">文书生成配置</h2>
            <form id="genForm">
                <div class="form-group">
                    <label>1. 选择文书模版</label>
                    <select id="docType" class="form-control" required>
                        <option value="">请选择</option>
                        <option value="privacy">用户隐私政策 (通用版)</option>
                        <option value="agreement">用户服务协议</option>
                        <option value="auth">征信查询授权书</option>
                        <option value="aml">反洗钱合规声明</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>2. 公司/主体名称</label>
                    <input type="text" id="companyName" class="form-control" placeholder="请输入完整公司名称" required>
                </div>
                <div class="form-group">
                    <label>3. 业务场景关键词</label>
                    <input type="text" id="keywords" class="form-control" placeholder="例如：第三方支付、信贷审批、会员注册">
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%; padding: 15px; margin-top: 20px;">AI 专家生成文书</button>
            </form>
        </div>

        <!-- Loading -->
        <div id="loader" class="loader-container" style="display: none; padding: 100px 0;">
            <span class="loader"></span>
            <p style="margin-top: 20px; font-size: 1.1rem; color: var(--primary-blue);">正在调用 AI 合规文书引擎，请稍候...</p>
        </div>

        <!-- Document Preview -->
        <div id="docPreview" class="paper-preview" style="display: none;">
            <div class="ai-answer" style="margin-bottom: 40px; background: #f0f7ff; border: 1px solid var(--primary-blue); padding: 20px; border-radius: 8px; font-style: italic; line-height: 1.6;">
                <strong>🤖 AI 法律合规专家寄语：</strong><br>
                “我已经根据最新的《个人信息保护法》及相关金融监管规定，为您定制了这份文书草案。请注意，本草案仅供合规参考，建议在正式使用前交由专业律师审核。”
            </div>
            <div id="docBody">
                <!-- Dynamic Document Content -->
            </div>
            <div class="report-actions" style="margin-top: 50px;">
                <button class="btn btn-primary" onclick="alert('操作成功：文书已导出为 Word')">导出 Word</button>
                <button class="btn btn-cta" onclick="alert('操作成功：正在打印预览')">打印文书</button>
                <button class="btn" style="background: var(--gray-200); color: var(--text-main);" onclick="location.reload()">重新生成</button>
            </div>
        </div>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 FinCheck 合规科技. 版权所有。</p>
        </div>
    </footer>

    <script>
        const form = document.getElementById('genForm');
        const loader = document.getElementById('loader');
        const container = document.getElementById('genContainer');
        const preview = document.getElementById('docPreview');
        const docBody = document.getElementById('docBody');

        // --- 豆包 (Doubao) API 配置 ---
        const API_KEY = 'ark-6c00de05-4616-42eb-b202-358f5bb04057-49af4';
        const MODEL_ID = 'doubao-seed-2-0-mini-260215';
        const API_URL = 'https://ark.cn-beijing.volces.com/api/v3/chat/completions';

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const company = document.getElementById('companyName').value;
            const typeText = document.getElementById('docType').selectedOptions[0].text;
            const keywords = document.getElementById('keywords').value || '相关金融服务';

            container.style.display = 'none';
            loader.style.display = 'block';

            const systemPrompt = `你是一位专业的中国法律合规专家。请根据用户提供的公司信息和业务场景，生成一份专业、严谨的合规文书。
            文书必须符合中国现行法律（如《民法典》、《个人信息保护法》等）。
            返回格式要求：直接返回 HTML 格式的内容（不需要 <html> 标签，直接从标题和正文开始）。`;

            const userPrompt = `公司名称：${company}\n文书类型：${typeText}\n业务场景：${keywords}`;

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${API_KEY}`
                    },
                    body: JSON.stringify({
                        model: MODEL_ID,
                        messages: [
                            { role: "system", content: systemPrompt },
                            { role: "user", content: userPrompt }
                        ]
                    })
                });

                if (!response.ok) {
                    const err = await response.json();
                    throw new Error(err.error?.message || 'API 调用失败');
                }

                const data = await response.json();
                let aiContent = data.choices[0].message.content;
                
                // 清理 AI 可能带的 ```html 标签
                aiContent = aiContent.replace(/```html/g, '').replace(/```/g, '');

                loader.style.display = 'none';
                preview.style.display = 'block';
                docBody.innerHTML = aiContent;
                preview.scrollIntoView({ behavior: 'smooth' });

            } catch (error) {
                console.error('API Error:', error);
                alert(`🤖 文书引擎连接失败: ${error.message}`);
                location.reload();
            }
        });
    </script>
</body>
</html>
